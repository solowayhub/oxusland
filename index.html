<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OxusTech</title>
  <script>
    (function () {
      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }

      var lang = getCookie('oxustech_lang') || getCookie('lang');
      var validLangs = ['ru', 'en', 'de'];

      if (!lang || validLangs.indexOf(lang) === -1) {
        var navLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        if (navLang.indexOf('ru') === 0) {
          lang = 'ru';
        } else if (navLang.indexOf('de') === 0) {
          lang = 'de';
        } else {
          lang = 'en'; // default fallback
        }
      }

      document.cookie = 'oxustech_lang=' + lang + '; path=/; max-age=31536000; SameSite=Lax';
      window.location.replace('./' + lang + '/');
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=./en/">
  </noscript>
</head>

<body style="background:#0F172A; color:#F8FAFC; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;">
  <p>Redirecting to OxusTech...</p>
</body>

</html>
